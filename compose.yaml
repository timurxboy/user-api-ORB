services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      TZ: "Asia/Tashkent"
      PGTZ: "Asia/Tashkent"
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    command: postgres -c 'max_connections=1000'
    ports:
      - ${DB_PORT}:5432
    volumes:
      - ${DB_PATH}:/var/lib/postgresql/data
    env_file:
      - .env

  backend:
    build:
      context: .  
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./logs:/app/logs
      - .:/app 
    depends_on:
      - db
    restart: always
    command: ["poetry", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}